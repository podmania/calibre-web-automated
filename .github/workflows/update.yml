name: Update to latest tag

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update (ignore current version)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Get latest tag
        id: latest
        run: |
          LATEST=$(curl -s https://api.github.com/repos/crocodilestick/Calibre-Web-Automated/tags | jq -r '.[0].name')
          echo "tag=${LATEST#v}" >> $GITHUB_OUTPUT   # strip leading 'v'

      - name: Get current version from package.nix
        id: current
        run: |
          CURRENT=$(grep -oP 'version = "\K[^"]+' package.nix | head -1)
          echo "version=$CURRENT" >> $GITHUB_OUTPUT

      - name: Determine if update needed
        id: check
        run: |
          FORCE=${{ github.event.inputs.force_update == 'true' }}
          if [ "$FORCE" = "true" ]; then
            echo "update=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ "${{ steps.latest.outputs.tag }}" != "${{ steps.current.outputs.version }}" ]; then
            echo "update=true" >> $GITHUB_OUTPUT
          else
            echo "update=false" >> $GITHUB_OUTPUT
          fi

      - name: Compute new hash
        if: steps.check.outputs.update == 'true'
        id: hash
        run: |
          TAG="v${{ steps.latest.outputs.tag }}"
          HASH=$(nix run nixpkgs#nix-prefetch-git -- https://github.com/crocodilestick/Calibre-Web-Automated.git --rev "$TAG_WITH_V" | jq -r '.sha256')
          echo "hash=$HASH" >> $GITHUB_OUTPUT
      
      - name: Update package.nix
        if: steps.check.outputs.update == 'true'
        run: |
          NEW_VER="${{ steps.latest.outputs.tag }}"
          NEW_HASH="${{ steps.hash.outputs.hash }}"
          sed -i "s|version = \".*\"|version = \"$NEW_VER\"|" package.nix
          sed -i "s|hash = \".*\"|hash = \"$NEW_HASH\"|" package.nix
          git config user.name "github-actions[bot]"
          git add package.nix
          git commit -m "chore: update calibre-web-automated to v$NEW_VER"
          git push
