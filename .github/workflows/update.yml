name: Update to latest tag and dependencies

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Get latest tag
        id: latest
        run: |
          LATEST=$(curl -s https://api.github.com/repos/crocodilestick/Calibre-Web-Automated/tags | jq -r '.[0].name')
          echo "tag=$LATEST" >> $GITHUB_OUTPUT

      - name: Get current tag
        id: current
        run: |
          CURRENT=$(grep -oP 'cwaRev = "\K[^"]+' flake.nix | head -1)
          echo "tag=$CURRENT" >> $GITHUB_OUTPUT

      - name: Determine if update needed
        id: check
        run: |
          FORCE=${{ github.event.inputs.force_rebuild == 'true' }}
          if [ "$FORCE" = "true" ]; then
            echo "update=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ "${{ steps.latest.outputs.tag }}" != "${{ steps.current.outputs.tag }}" ]; then
            echo "update=true" >> $GITHUB_OUTPUT
          else
            echo "update=false" >> $GITHUB_OUTPUT
          fi

      - name: Update flake.nix (new rev and hash)
        if: steps.check.outputs.update == 'true'
        run: |
          NEW_TAG="${{ steps.latest.outputs.tag }}"
          HASH=$(nix run nixpkgs#nix-prefetch-git -- https://github.com/crocodilestick/Calibre-Web-Automated.git --rev "$NEW_TAG" | jq -r '.sha256')
          sed -i "s|cwaRev = \".*\"|cwaRev = \"$NEW_TAG\"|" flake.nix
          sed -i "s|cwaSha256 = \".*\"|cwaSha256 = \"$HASH\"|" flake.nix
          sed -i "s|calibreWebAutomatedVersion = \".*\"|calibreWebAutomatedVersion = \"$NEW_TAG\"|" flake.nix
          git add flake.nix
          
      - name: Fetch requirements files and combine them
        if: steps.check.outputs.update == 'true'
        run: |
          TAG="${{ steps.latest.outputs.tag }}"
          curl -L -o requirements.txt "https://raw.githubusercontent.com/crocodilestick/Calibre-Web-Automated/$TAG/requirements.txt"
          curl -L -o optional-requirements.txt "https://raw.githubusercontent.com/crocodilestick/Calibre-Web-Automated/$TAG/optional-requirements.txt"
          
          # Get the list of available Python package names from nixpkgs
          nix eval nixpkgs#python3.pkgs --apply 'builtins.attrNames' --raw > pkglist.txt
          # Convert to a line-separated list for grep
          cat pkglist.txt | tr ' ' '\n' | sed 's/^"//;s/"$//' > pkgs.txt
      
          # Filter requirements.txt: keep lines where the first word (package name) is in pkgs.txt
          filter_requirements() {
            local infile=$1
            local outfile=$2
            > "$outfile"
            while IFS= read -r line; do
              # Skip empty lines and comments
              [[ -z "$line" || "$line" =~ ^# ]] && continue
              # Extract package name (everything before any of =,<,>,!,~)
              pkg_name=$(echo "$line" | sed -E 's/([a-zA-Z0-9_\.-]+).*/\1/')
              if grep -Fxq "$pkg_name" pkgs.txt; then
                echo "$line" >> "$outfile"
              else
                echo "Skipping missing package: $pkg_name" >> $GITHUB_STEP_SUMMARY
              fi
            done < "$infile"
          }
      
          filter_requirements requirements.txt requirements.filtered.txt
          filter_requirements optional-requirements.txt optional.filtered.txt
      
          # Combine filtered files
          cat optional.filtered.txt >> requirements.filtered.txt
          mv requirements.filtered.txt requirements.txt
          git add requirements.txt
    
      - name: Commit and push all changes
        if: steps.check.outputs.update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update to ${{ steps.latest.outputs.tag }} and sync requirements"
          git push
