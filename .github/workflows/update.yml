name: Update to latest tag

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
      - name: Get latest tag
        id: latest
        run: echo "tag=$(curl -s https://api.github.com/repos/crocodilestick/Calibre-Web-Automated/tags | jq -r '.[0].name')" >> $GITHUB_OUTPUT
      - name: Get current tag
        id: current
        run: echo "tag=$(grep -oP 'rev = "\K[^"]+' flake.nix | head -1)" >> $GITHUB_OUTPUT
      - if: steps.latest.outputs.tag != steps.current.outputs.tag
        run: |
          NEW_TAG="${{ steps.latest.outputs.tag }}"
          HASH=$(nix-prefetch-git https://github.com/crocodilestick/Calibre-Web-Automated.git --rev "$NEW_TAG" | jq -r '.sha256')
          sed -i "s|rev = \".*\"|rev = \"$NEW_TAG\"|" flake.nix
          sed -i "s|sha256 = \".*\"|sha256 = \"$HASH\"|" flake.nix
          sed -i "s|calibreWebAutomatedVersion = \".*\"|calibreWebAutomatedVersion = \"$NEW_TAG\"|" flake.nix
          git config user.name "github-actions[bot]"
          git add flake.nix
          git commit -m "chore: update to $NEW_TAG"
          git push
