name: Build and Push

on:
  push:
    branches: [main]
    paths: ['flake.nix']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
            system: x86_64-linux
          - runner: ubuntu-24.04-arm
            arch: arm64
            system: aarch64-linux
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: nix build .#calibre-web-automated --option sandbox false --option system ${{ matrix.system }}
      - run: |
          docker load < result
          VERSION=$(nix eval .#calibreWebAutomatedVersion --raw --impure --option system ${{ matrix.system }})
          docker tag calibre-web-automated:latest ${{ env.REGISTRY }}/${{ github.repository }}:${VERSION}-${{ matrix.arch }}
          docker tag calibre-web-automated:latest ${{ env.REGISTRY }}/${{ github.repository }}:latest-${{ matrix.arch }}
          docker push ${{ env.REGISTRY }}/${{ github.repository }}:${VERSION}-${{ matrix.arch }}
          docker push ${{ env.REGISTRY }}/${{ github.repository }}:latest-${{ matrix.arch }}
  create-manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          VERSION=$(grep -oP 'calibreWebAutomatedVersion = "\K[^"]+' flake.nix | head -1)
          docker manifest create ${{ env.REGISTRY }}/${{ github.repository }}:$VERSION \
            --amend ${{ env.REGISTRY }}/${{ github.repository }}:$VERSION-amd64 \
            --amend ${{ env.REGISTRY }}/${{ github.repository }}:$VERSION-arm64
          docker manifest push ${{ env.REGISTRY }}/${{ github.repository }}:$VERSION
          docker manifest create ${{ env.REGISTRY }}/${{ github.repository }}:latest \
            --amend ${{ env.REGISTRY }}/${{ github.repository }}:latest-amd64 \
            --amend ${{ env.REGISTRY }}/${{ github.repository }}:latest-arm64
          docker manifest push ${{ env.REGISTRY }}/${{ github.repository }}:latest
