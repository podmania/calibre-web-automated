name: Update uv.lock

on:
  schedule:
    - cron: '0 12 * * 0'   # weekly
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      # 1. Fetch the latest pyproject.toml from upstream
      - name: Fetch upstream pyproject.toml
        run: |
          curl -L -o pyproject.toml \
            https://raw.githubusercontent.com/crocodilestick/Calibre-Web-Automated/main/pyproject.toml

      # 2. Set up Python and uv
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install uv

      # 3. Regenerate uv.lock inside the sandbox
      - name: Regenerate uv.lock
        run: uv lock

      # 4. If changed, commit and push
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml uv.lock
          if git diff --cached --quiet; then
            echo "No changes to lock file"
            exit 0
          fi
          git commit -m "chore: update uv.lock from upstream pyproject.toml"
          git push
