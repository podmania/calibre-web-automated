name: Update Calibre-Web-Automated to latest tag

on:
  schedule:
    - cron: '0 12 * * *'   # daily at 12:00 UTC
  workflow_dispatch:        # manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install Nix with flakes enabled
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Get latest tag from GitHub API
      - name: Get latest tag
        id: latest
        run: |
          LATEST=$(curl -s https://api.github.com/repos/crocodilestick/Calibre-Web-Automated/tags | jq -r '.[0].name')
          echo "tag=$LATEST" >> $GITHUB_OUTPUT

      # Get current tag from flake.nix
      - name: Get current tag
        id: current
        run: |
          CURRENT=$(grep -oP 'rev = "\K[^"]+' flake.nix | head -1)
          echo "tag=$CURRENT" >> $GITHUB_OUTPUT

      # If new tag, update flake with prefetched hash
      - name: Update flake.nix
        if: steps.latest.outputs.tag != steps.current.outputs.tag
        run: |
          NEW_TAG="${{ steps.latest.outputs.tag }}"
      
          # Use nix-prefetch-git to get the SRI hash (e.g., "sha256-xxx...")
          HASH=$(nix shell nixpkgs#nix-prefetch-git -c nix-prefetch-git \
            https://github.com/crocodilestick/Calibre-Web-Automated \
            --rev "$NEW_TAG" | jq -r '.sha256')
      
          echo "New tag: $NEW_TAG"
          echo "New hash: $HASH"
      
          # Update the three lines in flake.nix
          sed -i "s|cwaRev = \".*\"|cwaRev = \"$NEW_TAG\"|" flake.nix
          sed -i "s|cwaSha256 = \".*\"|cwaSha256 = \"$HASH\"|" flake.nix
          sed -i "s|calibreWebAutomatedVersion = \".*\"|calibreWebAutomatedVersion = \"$NEW_TAG\"|" flake.nix
      
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          git commit -m "chore(cwa): update to $NEW_TAG"
          git push

      - name: No update
        if: steps.latest.outputs.tag == steps.current.outputs.tag
        run: echo "Already up-to-date at tag ${{ steps.current.outputs.tag }}"
